<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はなそだアルバム</title>
<style>
body {
  margin: 0;
  background: linear-gradient(#fdf8f5, #f6f1eb);
  font-family: "Hiragino Mincho ProN", serif;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  height: 100vh;
}

.book-container {
  position: relative;
  width: 80vw;
  max-width: 800px;
}

.book {
  position: relative;
  width: 100%;
  height: 60vh;
  perspective: 2000px;
}

.page {
  position: absolute;
  width: 50%;
  height: 100%;
  top: 0;
  background: #fffdf9;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  border-radius: 8px;
  backface-visibility: hidden;
  transform-style: preserve-3d;
  transition: transform 1s ease-in-out;
  cursor: pointer;
}

.left { left: 0; }
.right { right: 0; }

.content {
  padding: 20px;
  text-align: center;
}
img { max-width: 100%; max-height: 50%; border-radius: 10px; }
.meta { margin-top: 10px; font-size: 13px; color: #888; }
.caption { margin-top: 10px; font-size: 16px; color: #5a4a42; }

.cover-page {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  color: #5a4a42;
}

.return-btn {
  position: absolute;
  bottom: -50px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 240, 230, 0.7);
  border: none;
  border-radius: 12px;
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
  color: #5a4a42;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
.return-btn:hover { background: rgba(255, 240, 230, 0.9); }
</style>
</head>
<body>

<div class="book-container" id="bookContainer">
  <div class="book" id="book"></div>
  <button id="returnBtn" class="return-btn" style="display:none;">表紙に戻る</button>
</div>

<script>
const pagesData = [
  {img:"image1.jpg", date:"2025.04.01", place:"公園", text:"春のはじまり"},
  {img:"image2.jpg", date:"2025.05.10", place:"カフェ", text:"やさしい時間"},
  {img:"image3.jpg", date:"2025.06.20", place:"帰り道", text:"ふたりの記憶"},
  {img:"image4.jpg", date:"2025.07.02", place:"海", text:"少しだけ特別な日"}
];

let stage = 0;
let animating = false;

const bookContainer = document.getElementById("bookContainer");
const returnBtn = document.getElementById("returnBtn");
returnBtn.onclick = ()=>{ stage = 0; renderStage(); };

function renderStage(){
  const book = document.getElementById("book");
  book.innerHTML = "";
  returnBtn.style.display = "none";

  if(stage===0){
    const cover = createCover("思い出のアルバム", "right");
    cover.style.transform = "rotateY(0deg)";
    cover.onclick = ()=>flipPage('right');
    book.appendChild(cover);
  } else if(stage===1){
    const left = createPage(0,"left");
    const right = createPage(1,"right");
    left.style.transform = "rotateY(0deg)";
    right.style.transform = "rotateY(0deg)";
    left.onclick = ()=>flipPage('left');
    right.onclick = ()=>flipPage('right');
    book.appendChild(left);
    book.appendChild(right);
  } else if(stage===2){
    const left = createPage(2,"left");
    const right = createPage(3,"right");
    left.style.transform = "rotateY(0deg)";
    right.style.transform = "rotateY(0deg)";
    left.onclick = ()=>flipPage('left');
    right.onclick = ()=>flipPage('right');
    book.appendChild(left);
    book.appendChild(right);
  } else if(stage===3){
    const cover = createCover("裏表紙", "left");
    cover.style.transform = "rotateY(0deg)";
    cover.onclick = ()=>flipPage('left');
    book.appendChild(cover);

    returnBtn.style.display = "block";
  }
}

function createPage(index, side){
  const page = document.createElement("div");
  page.className = "page " + side;
  const data = pagesData[index];
  page.innerHTML = `
    <div class="content">
      <img src="${data.img}">
      <div class="meta">${data.date} / ${data.place}</div>
      <div class="caption">${data.text}</div>
    </div>
  `;
  return page;
}

function createCover(text, side){
  const page = document.createElement("div");
  page.className = "page " + side;
  page.innerHTML = `<div class="content cover-page">${text}</div>`;
  return page;
}

function flipPage(side){
  if(animating) return;
  animating = true;

  const book = document.getElementById("book");
  const currentPages = Array.from(book.children);

  if(side==='right'){
    const rightPage = currentPages.find(p=>p.classList.contains('right'));
    if(!rightPage){ animating=false; return; }
    rightPage.style.transformOrigin = "center left";
    rightPage.style.transform = "rotateY(-180deg)";
    setTimeout(()=> {
      stage = Math.min(stage+1,3);
      renderStage(); animating=false;
    }, 1000);
  }

  if(side==='left'){
    const leftPage = currentPages.find(p=>p.classList.contains('left'));
    if(!leftPage){ animating=false; return; }
    leftPage.style.transformOrigin = "center right";
    leftPage.style.transform = "rotateY(180deg)";
    setTimeout(()=> {
      stage = Math.max(stage-1,0);
      renderStage(); animating=false;
    }, 1000);
  }
}

// --- スワイプ操作 ---
let touchStartX = 0;
let touchEndX = 0;

bookContainer.addEventListener('touchstart', (e)=>{
  touchStartX = e.changedTouches[0].screenX;
});

bookContainer.addEventListener('touchend', (e)=>{
  touchEndX = e.changedTouches[0].screenX;
  handleGesture();
});

function handleGesture(){
  if(animating) return;
  const diff = touchEndX - touchStartX;
  if(diff > 50){ flipPage('left'); } // 右スワイプ → 前のページ
  else if(diff < -50){ flipPage('right'); } // 左スワイプ → 次のページ
}

renderStage();
</script>

</body>
</html>
