<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はなそだアルバム</title>
<style>
body {
  margin: 0;
  background: linear-gradient(#fdf8f5, #f6f1eb);
  font-family: "Hiragino Mincho ProN", serif;
  overflow-x: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  height: 100vh;
}

.book-container {
  position: relative;
  width: 90vw;
  max-width: 800px;
  margin: 20px auto;
}

.book {
  position: relative;
  width: 100%;
  max-height: 70vh;
  aspect-ratio: 1 / 1.4;
  perspective: 2000px;
}

.page {
  position: absolute;
  width: 50%;
  height: 100%;
  top: 0;
  background: #fffdf9;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  border-radius: 8px;
  backface-visibility: hidden;
  transform-style: preserve-3d;
  transition: transform 1s ease-in-out;
  cursor: pointer;
}

.left { left: 0; }
.right { right: 0; }

.content {
  padding: 20px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.page img {
  max-width: 90%;
  max-height: 45%;
  border-radius: 10px;
  object-fit: cover;
  margin-bottom: 20px;
}

.meta {
  font-size: 13px;
  color: #888;
  margin-bottom: 5px;
}

.caption {
  font-size: 16px;
  color: #5a4a42;
}

.cover-page {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  color: #5a4a42;
}

.return-btn {
  position: absolute;
  bottom: -50px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 240, 230, 0.7);
  border: none;
  border-radius: 12px;
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
  color: #5a4a42;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
.return-btn:hover { background: rgba(255, 240, 230, 0.9); }

/* スマホは1ページ表示 */
@media (max-width: 600px) {
  .page { width: 100%; }
}
</style>
</head>
<body>

<div class="book-container" id="bookContainer">
  <div class="book" id="book"></div>
  <button id="returnBtn" class="return-btn" style="display:none;">表紙に戻る</button>
</div>

<script>
const pagesData = [
  {img:"花屋ヘッダー.png", date:"2025.04.01", place:"公園", text:"春のはじまり"},
  {img:"花束.png", date:"2025.05.10", place:"カフェ", text:"やさしい時間"},
  {img:"季節の花.png", date:"2025.06.20", place:"帰り道", text:"ふたりの記憶"},
  {img:"鉢植え.png", date:"2025.07.02", place:"海", text:"少しだけ特別な日"}
];

let stage = 0;
let animating = false;

const bookContainer = document.getElementById("bookContainer");
const returnBtn = document.getElementById("returnBtn");
const isMobile = window.innerWidth <= 600;

returnBtn.onclick = ()=>{ stage = 0; renderStage(); };

function renderStage(){
  const book = document.getElementById("book");
  book.innerHTML = "";
  returnBtn.style.display = "none";

  if(stage===0){
    const cover = createCover("思い出のアルバム", "right");
    cover.style.transform = "rotateY(0deg)";
    cover.onclick = ()=>flipPage('right');
    book.appendChild(cover);
  } 
  else if(stage>=1 && stage<=4){
    if(isMobile){
      let index;
      if(stage===1) index = 0; // 左ページ
      else if(stage===2) index = 1; // 右ページ
      else if(stage===3) index = 2; // 左ページ
      else if(stage===4) index = 3; // 右ページ

      const page = createPage(index,"right");
      page.style.transform = "rotateY(0deg)";
      page.onclick = ()=>flipPage('right');
      book.appendChild(page);
    } else {
      const leftIndex = (stage===1) ? 0 : 2;
      const rightIndex = (stage===1) ? 1 : 3;
      const left = createPage(leftIndex,"left");
      const right = createPage(rightIndex,"right");
      left.style.transform = "rotateY(0deg)";
      right.style.transform = "rotateY(0deg)";
      left.onclick = ()=>flipPage('left');
      right.onclick = ()=>flipPage('right');
      book.appendChild(left);
      book.appendChild(right);
    }
  }
  else if(stage===5){
    const cover = createCover("裏表紙", "left");
    cover.style.transform = "rotateY(0deg)";
    cover.onclick = ()=>flipPage('left');
    book.appendChild(cover);
    returnBtn.style.display = "block";
  }
}

function createPage(index, side){
  const page = document.createElement("div");
  page.className = "page " + side;
  const data = pagesData[index];
  page.innerHTML = `
    <div class="content">
      <img src="${data.img}">
      <div class="meta">${data.date} / ${data.place}</div>
      <div class="caption">${data.text}</div>
    </div>
  `;
  return page;
}

function createCover(text, side){
  const page = document.createElement("div");
  page.className = "page " + side;
  page.style.background = "#f9e8d6"; // 淡いクリーム色
  page.innerHTML = `<div class="content cover-page">${text}</div>`;
  return page;
}

function flipPage(side){
  if(animating) return;
  animating = true;
  const book = document.getElementById("book");
  const currentPages = Array.from(book.children);

  if(side==='right'){
    const rightPage = currentPages.find(p=>p.classList.contains('right'));
    if(!rightPage){ animating=false; return; }
    rightPage.style.transformOrigin = "center left";
    rightPage.style.transform = "rotateY(-180deg)";
    setTimeout(()=>{
      if(isMobile){
        stage = Math.min(stage+1,5);
      } else {
        stage = Math.min(stage+2,5);
      }
      renderStage(); animating=false;
    }, 1000);
  }

  if(side==='left'){
    const leftPage = currentPages.find(p=>p.classList.contains('left'));
    if(!leftPage){ animating=false; return; }
    leftPage.style.transformOrigin = "center right";
    leftPage.style.transform = "rotateY(180deg)";
    setTimeout(()=>{
      if(isMobile){
        stage = Math.max(stage-1,0);
      } else {
        stage = Math.max(stage-2,0);
      }
      renderStage(); animating=false;
    }, 1000);
  }
}

// --- スワイプ操作 ---
let touchStartX = 0;
let touchEndX = 0;
bookContainer.addEventListener('touchstart', (e)=>{ touchStartX = e.changedTouches[0].screenX; });
bookContainer.addEventListener('touchend', (e)=>{ touchEndX = e.changedTouches[0].screenX; handleGesture(); });

function handleGesture(){
  if(animating) return;
  const diff = touchEndX - touchStartX;
  if(diff > 50){ flipPage('left'); }
  else if(diff < -50){ flipPage('right'); }
}

renderStage();
</script>
</body>
</html>
