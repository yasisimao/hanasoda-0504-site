<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Hanasoda!ニュース</title>
<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#ffffff;
  margin:0;
  color:#222;
}
header{
  border-bottom:2px solid #e60012;
  padding:15px 20px;
}
header h1{
  color:#e60012;
  margin:0;
  font-size:32px;
}
nav{
  margin-top:10px;
}
nav a{
  margin-right:15px;
  text-decoration:none;
  color:#0033cc;
  font-size:14px;
}
.container{
  max-width:1100px;
  margin:20px auto;
  display:flex;
  gap:30px;
  padding:0 20px;
}
.main{
  flex:3;
}
.main h2{
  font-size:20px;
  border-bottom:1px solid #ddd;
  padding-bottom:8px;
}
.news-list{
  list-style:none;
  padding:0;
}
.news-list li{
  margin:12px 0;
}
.news-list a{
  color:#0033cc;
  text-decoration:none;
  font-size:16px;
}
.news-list a:hover{
  text-decoration:underline;
}
.side{
  flex:1.5;
}
.ranking{
  border:1px solid #ddd;
  padding:15px;
}
.ranking h3{
  margin-top:0;
  font-size:18px;
}
.ranking ol{
  padding-left:20px;
}
.ranking li{
  margin:10px 0;
}
.ranking a{
  color:#0033cc;
  text-decoration:none;
  font-size:14px;
}
footer{
  margin-top:40px;
  padding:20px;
  background:#f5f5f5;
  font-size:12px;
  text-align:center;
  color:#666;
}

.glitch{
  animation: none;
}

.glitch.active{
  animation: noise 0.2s linear 6;
}

.glitch.active a{
  animation: redText 0.25s linear 1;
}

.glitch.active .flash{
  animation: darkRedLabel 0.25s linear 1;
}

@keyframes redText{
  0% { color:#0033cc; }
  50% { color:red; }
  100% { color:#0033cc; }
}

@keyframes darkRedLabel{
  0% { background:#e60012; }
  50% { background:#8b0000; } /* 暗赤 */
  100% { background:#e60012; }
}
@keyframes noise{
  0% { transform: translate(0,0); opacity:1; }
  20% { transform: translate(-2px,2px); }
  40% { transform: translate(2px,-2px); }
  60% { transform: translate(-2px,-1px); }
  80% { transform: translate(2px,1px); }
  100% { transform: translate(0,0); opacity:1; }
}

</style>
</head>
<body>

<header>
<h1>Hanasoda!ニュース</h1>
<nav>
<a href="#">国内</a>
<a href="#">国際</a>
<a href="#">経済</a>
<a href="#">エンタメ</a>
<a href="#">アニメ</a>
</nav>
</header>

<div class="container">

<div class="main">
<h2>主要ニュース</h2>
<ul class="news-list">
<li><a href="記事1.html">【特集】くろすけとももた最新話が話題に</a></li>
<li><a href="#">「おかしなやさいーズ」LINEスタンプ発売中!！</a></li>
<li><a href="#">制作陣「物語はここから動く」</a></li>
<li><a href="#">深夜限定で公開された記事とは</a></li>
<li><a href="#">SNSでトレンド入りした理由</a></li>
<li id="nightArticle" style="display:none;">
<span class="flash">2009年 両親死亡事件</span>
<a href="Hanasoda!ニュース.html">【速報】自宅で両親死亡、5歳女児を保護　近隣住民が通報</a>
</li>
</ul>
</div>

<div class="side">
<div class="ranking">
<h3>アクセスランキング</h3>
<ol>
<li><a href="#">くろすけの過去が明らかに</a></li>
<li><a href="#">ももたの発言が波紋</a></li>
<li><a href="#">伏線まとめ考察</a></li>
<li><a href="#">衝撃ラストに反響</a></li>
<li><a href="#">次回予告を徹底分析</a></li>
</ol>
</div>
</div>

</div>

<footer>
© Hanasoda!ニュース
</footer>

<script>
window.onload = function(){

  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  const current = h*3600 + m*60 + s;

  const start = 21*3600 + 44*60 + 13;
  const end = 5*3600 + 59*60 + 59;

  const nightArticle = document.getElementById("nightArticle");

  if(current >= start || current <= end){

    // 表示
    nightArticle.style.display = "list-item";

    // ザザザ発動
    setTimeout(() => {
      nightArticle.classList.add("active");
    }, 100);

  }

};
</script>

</body>
</html>
